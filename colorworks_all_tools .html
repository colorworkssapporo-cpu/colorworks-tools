<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="スタイル診断">
<title>COLORWORKS スタイル診断ツール</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff;
  --bg2: #f7f6f3;
  --text: #1a1a1a;
  --text2: #6b6b6b;
  --border: rgba(0,0,0,0.12);
  --border2: rgba(0,0,0,0.22);
  --rm: 10px;
  --rl: 14px;
  --tab-h: 56px;
  --brand: #1B2880;
  --brand2: #E0287A;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a1a;--bg2:#252525;--text:#f0f0f0;--text2:#999;
    --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
  }
}
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  background: var(--bg2);
  color: var(--text);
  -webkit-text-size-adjust: 100%;
}

/* ── App Shell ── */
.app-shell {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 680px;
  margin: 0 auto;
  background: var(--bg);
  position: relative;
}

/* ── Top Header ── */
.app-header {
  background: var(--brand);
  padding: 12px 16px 10px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-header-title {
  font-size: 13px;
  font-weight: 500;
  color: white;
  letter-spacing: 0.08em;
}
.app-header-sub {
  font-size: 10px;
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.06em;
}

/* ── Tab Bar ── */
.tab-bar {
  display: flex;
  background: var(--bg);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1;
  min-width: 80px;
  padding: 10px 4px 8px;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  color: var(--text2);
  transition: color 0.15s;
  position: relative;
}
.tab-btn .tab-icon { font-size: 17px; line-height: 1; }
.tab-btn .tab-label {
  font-size: 9.5px;
  letter-spacing: 0.03em;
  white-space: nowrap;
  color: inherit;
}
.tab-btn.active {
  color: var(--brand);
}
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 10%; right: 10%;
  height: 2px;
  background: var(--brand);
  border-radius: 1px;
}

/* ── Content Area ── */
.content-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 1.5rem 1rem 2rem;
}

/* ── Panel ── */
.panel { display: none; }
.panel.active { display: block; }

/* ── Tool header override for combined view ── */
.tool-header, .hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 1rem;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 1.5rem;
}

/* ── Shared component styles ── */

/* === kokkaku === */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --color-bg: #ffffff;
    --color-bg-secondary: #f7f6f3;
    --color-text: #1a1a1a;
    --color-text-secondary: #6b6b6b;
    --color-border: rgba(0,0,0,0.12);
    --color-border-mid: rgba(0,0,0,0.22);
    --radius-md: 10px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1a1a1a;
      --color-bg-secondary: #252525;
      --color-text: #f0f0f0;
      --color-text-secondary: #999;
      --color-border: rgba(255,255,255,0.12);
      --color-border-mid: rgba(255,255,255,0.22);
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    background: var(--color-bg-secondary);
    color: var(--color-text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  #app_kokkaku {
    max-width: 640px;
    margin: 0 auto;
    background: var(--color-bg);
    border-radius: 20px;
    padding: 2rem 1.75rem 2.5rem;
    border: 0.5px solid var(--color-border);
  }
  .tool-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 1.25rem;
    border-bottom: 0.5px solid var(--color-border);
    margin-bottom: 1.75rem;
  }
  .tool-title { font-size: 13px; font-weight: 500; letter-spacing: 0.12em; color: var(--color-text-secondary); }
  .tool-badge { font-size: 11px; padding: 3px 10px; border: 0.5px solid var(--color-border); border-radius: 20px; color: var(--color-text-secondary); }
  .step-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .step-label { font-size: 12px; color: var(--color-text-secondary); }
  .progress-bar { width: 100%; height: 2px; background: var(--color-border); border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-fill { height: 2px; background: var(--color-text); border-radius: 2px; transition: width 0.4s ease; }
  .category-tag { display: inline-block; font-size: 11px; letter-spacing: 0.08em; color: var(--color-text-secondary); border: 0.5px solid var(--color-border); border-radius: 3px; padding: 2px 8px; margin-bottom: 10px; }
  .q-text { font-size: 15px; font-weight: 500; color: var(--color-text); margin-bottom: 6px; line-height: 1.6; }
  .q-sub { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 1.25rem; line-height: 1.6; }
  .opt { display: grid; grid-template-columns: auto 1fr auto; align-items: start; gap: 10px; width: 100%; padding: 11px 14px; margin-bottom: 7px; background: var(--color-bg-secondary); border: 0.5px solid var(--color-border); border-radius: var(--radius-md); cursor: pointer; text-align: left; transition: all 0.15s; }
  .opt:hover { background: var(--color-bg); border-color: var(--color-border-mid); }
  .opt.sel { background: var(--color-bg); border-color: var(--color-text); }
  .odot { width: 16px; height: 16px; min-width: 16px; border-radius: 50%; border: 1.5px solid var(--color-border-mid); margin-top: 2px; display: flex; align-items: center; justify-content: center; }
  .opt.sel .odot { border-color: var(--color-text); background: var(--color-text); }
  .odot-inner { width: 6px; height: 6px; border-radius: 50%; background: var(--color-bg); display: none; }
  .opt.sel .odot-inner { display: block; }
  .opt-label { font-size: 13px; font-weight: 500; color: var(--color-text); line-height: 1.5; }
  .opt-desc { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .opt-type-pill { font-size: 10px; padding: 2px 7px; border-radius: 10px; letter-spacing: 0.06em; align-self: flex-start; margin-top: 2px; }
  .pill-S { background: #f5eded; color: #8b5a5a; }
  .pill-W { background: #edf0f5; color: #5a6e8b; }
  .pill-N { background: #edf5ef; color: #3d6b46; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; }
  .btn-primary { padding: 10px 26px; background: var(--color-text); color: var(--color-bg); border: none; border-radius: var(--radius-md); font-size: 13px; cursor: pointer; letter-spacing: 0.04em; }
  .btn-primary:disabled { opacity: 0.25; cursor: not-allowed; }
  .btn-ghost { padding: 10px 18px; background: transparent; border: 0.5px solid var(--color-border); border-radius: var(--radius-md); font-size: 13px; color: var(--color-text-secondary); cursor: pointer; }
  .result-header { text-align: center; padding: 2rem 0 1.5rem; border-bottom: 0.5px solid var(--color-border); margin-bottom: 1.5rem; }
  .result-label { font-size: 11px; letter-spacing: 0.15em; color: var(--color-text-secondary); margin-bottom: 10px; }
  .result-type { font-size: 28px; font-weight: 500; color: var(--color-text); letter-spacing: 0.04em; }
  .result-eng { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; letter-spacing: 0.1em; }
  .result-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.85; margin-top: 1rem; text-align: left; }
  .section-title { font-size: 11px; letter-spacing: 0.12em; color: var(--color-text-secondary); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 0.5px solid var(--color-border); }
  .tag-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
  .tag { font-size: 12px; padding: 4px 12px; border: 0.5px solid var(--color-border); border-radius: 20px; color: var(--color-text-secondary); }
  .tag.avoid { background: var(--color-bg-secondary); text-decoration: line-through; opacity: 0.6; }
  .collar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .collar-item { background: var(--color-bg-secondary); border-radius: var(--radius-md); padding: 10px; text-align: center; }
  .collar-icon { width: 40px; height: 40px; margin: 0 auto 6px; color: var(--color-text-secondary); }
  .collar-name { font-size: 11px; color: var(--color-text); }
  .collar-note { font-size: 10px; color: var(--color-text-secondary); margin-top: 2px; }
  .divider { height: 0.5px; background: var(--color-border); margin: 1.5rem 0; }
  .score-section { margin-bottom: 1.5rem; }
  .score-row { margin-bottom: 12px; }
  .score-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .score-type { font-size: 13px; color: var(--color-text); }
  .score-num { font-size: 12px; color: var(--color-text-secondary); }
  .score-bg { height: 6px; background: var(--color-border); border-radius: 3px; }
  .score-fill { height: 6px; border-radius: 3px; transition: width 0.7s ease; }
  .restart-btn { width: 100%; padding: 11px; background: transparent; border: 0.5px solid var(--color-border); border-radius: var(--radius-md); font-size: 13px; color: var(--color-text-secondary); cursor: pointer; margin-top: 0.5rem; letter-spacing: 0.04em; }

*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f7f6f3;--text:#1a1a1a;--text2:#6b6b6b;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);--rm:10px;--rl:14px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#252525;--text:#f0f0f0;--text2:#999;--border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;padding:2rem 1rem}
#app_axis{max-width:680px;margin:0 auto;background:var(--bg);border-radius:20px;padding:2rem 1.75rem 2.5rem;border:.5px solid var(--border)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:1.25rem;border-bottom:.5px solid var(--border);margin-bottom:1.75rem;flex-wrap:wrap;gap:8px}
.htitle{font-size:12px;font-weight:500;letter-spacing:.1em;color:var(--text2)}
.hbadge{font-size:11px;padding:3px 10px;border:.5px solid var(--border);border-radius:20px;color:var(--text2)}
.axis-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.5rem}
@media(max-width:520px){.axis-grid{grid-template-columns:1fr}}
.axis-block{border:.5px solid var(--border);border-radius:var(--rl);padding:14px 12px}
.axis-num{font-size:10px;letter-spacing:.1em;color:var(--text2);margin-bottom:4px}
.axis-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:10px}
.axis-sel{width:100%;padding:8px 10px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rm);font-size:12px;color:var(--text);cursor:pointer;appearance:none;-webkit-appearance:none}
.axis-sel:focus{outline:none;border-color:var(--border2)}
.run-btn{width:100%;padding:11px;background:var(--text);color:var(--bg);border:none;border-radius:var(--rm);font-size:13px;cursor:pointer;letter-spacing:.06em;margin-bottom:1.5rem}
.run-btn:disabled{opacity:.25;cursor:not-allowed}
.badges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.cbadge{font-size:11px;padding:3px 12px;border-radius:20px;font-weight:500}
.sec{font-size:11px;letter-spacing:.1em;color:var(--text2);margin:1.5rem 0 10px;padding-bottom:6px;border-bottom:.5px solid var(--border)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.5rem}
.tag{font-size:12px;padding:4px 12px;border:.5px solid var(--border);border-radius:20px;color:var(--text2)}
.tag.avoid{text-decoration:line-through;opacity:.5;background:var(--bg2)}
.cards2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.5rem}
.card{background:var(--bg2);border-radius:var(--rm);padding:11px 13px}
.card-k{font-size:11px;color:var(--text2);margin-bottom:4px;letter-spacing:.05em}
.card-v{font-size:12px;color:var(--text);line-height:1.6}
.divider{height:.5px;background:var(--border);margin:1.5rem 0}
.color-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:.5rem}
.cswatch{display:flex;align-items:center;gap:6px;padding:4px 11px 4px 5px;border:.5px solid var(--border);border-radius:20px}
.cdot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.cname{font-size:11px;color:var(--text2)}
.hlbox{border:.5px solid var(--border);border-radius:var(--rm);padding:14px 16px;margin-top:.5rem}
.hl-label{font-size:11px;color:var(--text2);letter-spacing:.07em;margin-bottom:6px}
.hl-text{font-size:13px;color:var(--text);line-height:1.75}
.cfbox{background:var(--bg2);border-radius:var(--rm);padding:12px 14px;margin:.5rem 0}
.cf-label{font-size:11px;color:var(--text2);margin-bottom:5px}
.cf-text{font-size:12px;color:var(--text2);line-height:1.7}
.reset-btn{width:100%;padding:10px;background:transparent;border:.5px solid var(--border);border-radius:var(--rm);font-size:13px;color:var(--text2);cursor:pointer;margin-top:.75rem}
optgroup{font-weight:500;color:var(--text)}

</style>
</head>

// ── Tab Switching ──────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => {
    p.style.display = 'none';
    p.classList.remove('active');
  });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('panel_' + tab);
  if (panel) { panel.style.display = 'block'; panel.classList.add('active'); }
  const btn = document.querySelector('[data-tab="' + tab + '"]');
  if (btn) btn.classList.add('active');
  // Scroll content to top
  document.querySelector('.content-area').scrollTop = 0;
}

// Show first tab on load
document.getElementById('panel_kokkaku').style.display = 'block';
document.getElementById('panel_kokkaku').classList.add('active');

      </div>`).join('')}
    <div class="nav-row">
      <button class="btn-ghost" id="back" ${cur===0?'style="visibility:hidden"':''}>← 戻る</button>
      <button class="btn-primary" id="next" ${sel===undefined?'disabled':''}>
        ${cur===TOTAL-1?'診断する →':'次へ →'}
      </button>
    </div>`;
  document.getElementById('main_kokkaku').appendChild(el);
  el.querySelectorAll('.opt').forEach(o=>o.addEventListener('click',()=>{ans[cur]=+o.dataset.i;render();}));

function getType(a,c){
  if(a>=0){
    if(c>=10)return'FE';
    if(c>=4)return'SE';
    if(a>=14||c<=-4)return'CO';
    return'EL';
  }
  if(c>=16)return'AK';
  if(c>=2)return'CU';
  if((-a)>=10||(-c)>=6)return'CC';
  return'FR';
}

function makeChart(a,c){
  const W=240,H=200,cx=120,cy=100,rx=88,ry=76;
  const an=Math.max(-1,Math.min(1,a/22));
  const cn=Math.max(-1,Math.min(1,c/18));
  const px=Math.round(cx+cn*rx);
  const py=Math.round(cy-an*ry);
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;height:auto">
    <rect x="${cx-rx}" y="${cy-ry}" width="${rx}" height="${ry}" fill="rgba(120,130,160,0.07)" rx="2"/>
    <rect x="${cx}" y="${cy-ry}" width="${rx}" height="${ry}" fill="rgba(160,120,130,0.07)" rx="2"/>
    <rect x="${cx-rx}" y="${cy}" width="${rx}" height="${ry}" fill="rgba(130,160,140,0.07)" rx="2"/>
    <rect x="${cx}" y="${cy}" width="${rx}" height="${ry}" fill="rgba(180,140,110,0.07)" rx="2"/>
    <line x1="${cx-rx}" y1="${cy}" x2="${cx+rx}" y2="${cy}" stroke="rgba(128,128,128,0.25)" stroke-width="0.5"/>
    <line x1="${cx}" y1="${cy-ry}" x2="${cx}" y2="${cy+ry}" stroke="rgba(128,128,128,0.25)" stroke-width="0.5"/>
    <text x="${cx}" y="${cy-ry-5}" text-anchor="middle" font-size="10" fill="rgba(120,120,120,0.9)">大人顔</text>
    <text x="${cx}" y="${cy+ry+13}" text-anchor="middle" font-size="10" fill="rgba(120,120,120,0.9)">子供顔</text>
    <text x="${cx-rx-4}" y="${cy+3}" text-anchor="end" font-size="10" fill="rgba(120,120,120,0.9)">直線</text>
    <text x="${cx+rx+4}" y="${cy+3}" text-anchor="start" font-size="10" fill="rgba(120,120,120,0.9)">曲線</text>
    <text x="${cx-rx+4}" y="${cy-ry+13}" font-size="8.5" fill="rgba(120,120,120,0.65)">クール</text>
    <text x="${cx-8}" y="${cy-ry+13}" text-anchor="end" font-size="8.5" fill="rgba(120,120,120,0.65)">エレガント</text>
    <text x="${cx+4}" y="${cy-ry+13}" font-size="8.5" fill="rgba(120,120,120,0.65)">ソフトEL</text>
    <text x="${cx+rx-4}" y="${cy-ry+13}" text-anchor="end" font-size="8.5" fill="rgba(120,120,120,0.65)">フェミニン</text>

    <text x="${cx+4}" y="${cy+ry-5}" font-size="8.5" fill="rgba(120,120,120,0.65)">キュート</text>
    <text x="${cx+rx-4}" y="${cy+ry-5}" text-anchor="end" font-size="8.5" fill="rgba(120,120,120,0.65)">アクティブ</text>
    <circle cx="${px}" cy="${py}" r="7" fill="#333" opacity="0.85"/>
    <circle cx="${px}" cy="${py}" r="3.5" fill="white" opacity="0.9"/>
  </svg>`;
}

let cur=0,ans=[],aT=0,cT=0;
const N=Qs.length;

function render(){document.getElementById('main_kao').innerHTML='';cur<N?renderQ():renderResult();}

function renderQ(){
  const q=Qs[cur],sel=ans[cur];
  const pct=Math.round(cur/N*100);
  const el=document.createElement('div');
  el.innerHTML=`
    <div class="srow"><span class="slabel">${cur+1} / ${N}</span><span class="slabel">${q.cat}</span></div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    <div class="ctag">${q.cat}</div>
    <div class="qtext">${q.q}</div>
    <div class="qsub">${q.sub}</div>
    ${q.opts.map((o,i)=>`
      <div class="opt${sel===i?' sel':''}" data-i="${i}">
        <div class="odot"><div class="oi"></div></div>
        <div><div class="olabel">${o.l}</div><div class="odesc">${o.d}</div></div>
      </div>`).join('')}
    <div class="navrow">
      <button class="btng" id="bk" ${cur===0?'style="visibility:hidden"':''}>← 戻る</button>
      <button class="btnp" id="nx" ${sel===undefined?'disabled':''}>
        ${cur===N-1?'診断する →':'次へ →'}
      </button>
    </div>`;
  document.getElementById('main_kao').appendChild(el);
  el.querySelectorAll('.opt').forEach(o=>o.addEventListener('click',()=>{ans[cur]=+o.dataset.i;render();}));
  el.querySelector('#nx').addEventListener('click',()=>{
    if(ans[cur]===undefined)return;
    cur++;
    if(cur>=N){aT=0;cT=0;ans.forEach((a,qi)=>{aT+=Qs[qi].opts[a].a;cT+=Qs[qi].opts[a].c;});}
    render();
  });
  const bk=el.querySelector('#bk');if(bk&&cur>0)bk.addEventListener('click',()=>{cur--;render();});
}

function renderResult(){
  const type=getType(aT,cT);
  const r=T[type];
  const el=document.createElement('div');
  el.innerHTML=`
    <div style="padding-bottom:1.5rem;border-bottom:.5px solid var(--border);margin-bottom:1.5rem">
      <div class="r-accent" style="background:${r.col}"></div>
      <div class="r-label">診断結果</div>
      <div class="r-name">${r.name}</div>
      <div class="r-eng">${r.eng} Type</div>

      <div class="tags">${r.kw.map(k=>`<span class="tag">${k}</span>`).join('')}</div>

    <div class="sec">顔タイプ軸チャート</div>
    <div class="axis-wrap">${makeChart(aT,cT)}</div>

    <div class="sec">メイクのポイント</div>
    <div class="mup-grid">${r.makeup.map(m=>`<div class="mup-item"><div class="mup-k">${m.k}</div><div class="mup-v">${m.v}</div></div>`).join('')}</div>
    <div class="sec">似合うヘアスタイル</div>
    <div class="tags">${r.hair.map(h=>`<span class="tag">${h}</span>`).join('')}</div>
    <div class="divider"></div>
    <div class="sec">似合うファッション・スタイル</div>
    <div class="tags">${r.fashion.map(f=>`<span class="tag">${f}</span>`).join('')}</div>
    <div class="sec">似合う衿形・ネックライン</div>
    <div class="tags">${r.necklines.map(n=>`<span class="tag">${n}</span>`).join('')}</div>
    <div class="sec">避けたい衿形</div>
    <div class="tags">${r.avoidN.map(n=>`<span class="tag avoid">${n}</span>`).join('')}</div>
    <div class="divider"></div>
    <div class="sec">似合うカラーパレット</div>
    <div class="tags">${r.colors.map(c=>`<span class="tag">${c}</span>`).join('')}</div>
    <div class="sec">アクセサリー</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:.5rem">${r.acc}</div>
    <div class="divider"></div>
    <div class="sec">スタイリングのヒント</div>
    <div class="hintbox"><div class="hintlabel">ポイント</div><div class="hinttext">${r.tip}</div></div>
    <button class="restart" id="rs">もう一度診断する</button>`;
  document.getElementById('main_kao').appendChild(el);
  document.getElementById('rs').addEventListener('click',()=>{cur=0;ans=[];aT=0;cT=0;render();});
}

render();

})();

let cur=0,ans=[],scores={S:0,Su:0,A:0,W:0};
const N=Qs.length;

function render(){document.getElementById('main_pc').innerHTML='';cur<N?renderQ():renderResult();}

function renderQ(){
  const q=Qs[cur],sel=ans[cur];
  const pct=Math.round(cur/N*100);
  const el=document.createElement('div');
  el.innerHTML=`
    <div class="srow"><span class="slabel">${cur+1} / ${N}</span><span class="slabel">${q.cat}</span></div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    <div class="ctag">${q.cat}</div>
    <div class="qtext">${q.q}</div>
    ${q.sub?`<div class="qsub">${q.sub}</div>`:''}
    ${q.opts.map((o,i)=>`
      <div class="opt${sel===i?' sel':''}" data-i="${i}">
        <div class="odot"><div class="oi"></div></div>
        <div><div class="olabel">${o.l}</div><div class="odesc">${o.d}</div></div>
      </div>`).join('')}
    <div class="navrow">
      <button class="btng" id="bk" ${cur===0?'style="visibility:hidden"':''}>← 戻る</button>
      <button class="btnp" id="nx" ${sel===undefined?'disabled':''}>
        ${cur===N-1?'診断する →':'次へ →'}
      </button>
    </div>`;
  document.getElementById('main_pc').appendChild(el);
  el.querySelectorAll('.opt').forEach(o=>o.addEventListener('click',()=>{ans[cur]=+o.dataset.i;render();}));
  el.querySelector('#nx').addEventListener('click',()=>{
    if(ans[cur]===undefined)return;
    cur++;
    if(cur>=N){
      scores={S:0,Su:0,A:0,W:0};
      ans.forEach((a,qi)=>{
        const s=Qs[qi].opts[a].s;
        Object.keys(s).forEach(k=>{scores[k]+=s[k];});
      });
    }
    render();
  });
  const bk=el.querySelector('#bk');if(bk&&cur>0)bk.addEventListener('click',()=>{cur--;render();});
}

function renderResult(){
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const p=sorted[0][0],s=sorted[1][0];
  const key=`${p}_${s}`;

    <div style="margin-top:10px"><div class="tags">${r.avoid.map(a=>`<span class="tag avoid">${a}</span>`).join('')}</div></div>

    </div>
    <button class="restart" id="rs">もう一度診断する</button>`;
  document.getElementById('main_pc').appendChild(el);
  document.getElementById('rs').addEventListener('click',()=>{cur=0;ans=[];scores={S:0,Su:0,A:0,W:0};render();});
}

function synthesize(k,f,p){
  const kd=KK[k],fd=KA[f],pd=PC[p];
  const summary=(()=>{
    if(k==='S'&&['FE','EL','CO','SE'].includes(f))return`${pd.name}の色味を活かした、上品でシャープな洗練スタイル。${pd.matHint}とシンプルなラインで3軸の良さが最大限に引き立ちます。`;
    if(k==='S'&&['CU','AK'].includes(f))return`${pd.name}のカラーで彩りながら、骨格ストレートの直線ラインを意識したポップ・フレッシュなスタイル。顔周りにカラーポイントを、全体はすっきりまとめて。`;
    if(k==='W'&&['FE','SE','CU'].includes(f))return`${pd.name}のカラーを活かした、曲線美とやわらかさが際立つ女性らしいスタイル。ウエストマークと${pd.matHint}で魅力が最大に。`;
    if(k==='W'&&['CO','EL','CC'].includes(f))return`${pd.name}の色でクールさを保ちながら、ウェーブの曲線ラインをさりげなく活かすスタイル。甘くなりすぎずに女性らしさと洗練を両立できます。`;
    if(k==='N'&&['CO','CC','FR'].includes(f))return`${pd.name}のカラーで素材感・フレーム感を前面に出した、こなれたラフスタイル。${pd.matHint}で骨格ナチュラルの魅力が引き立ちます。`;
    if(k==='N'&&['FE','EL','SE'].includes(f))return`${pd.name}の上品なカラーに、ナチュラルの素材感・ボリューム感を掛け合わせた「こなれエレガント」スタイル。大ぶりアクセと質感ある素材がポイントです。`;
    return`${pd.name}の色味を活かしながら、${kd.name}の骨格ラインと${fd.name}の顔印象を融合させた、あなただけのスタイル。3軸のバランスを意識した着こなしが最も輝きます。`;
  })();
  const conflict=(()=>{
    if(k==='S'&&['CU','AK'].includes(f))return`骨格ストレートはシンプル・ハリ素材が得意ですが、顔タイプは甘め・ポップなデザインが映えます。トップスのネックラインや小物で顔周りに可愛さを取り入れ、コーデ全体はすっきりまとめるとバランス◎`;
    if(k==='W'&&['CO','CC'].includes(f))return`ウェーブはやわらかい素材・曲線が得意ですが、顔タイプはクールな雰囲気。素材はやわらかく保ちつつ、色・デザインでクールさを表現するとギャップが魅力になります。`;
    if(k==='N'&&['CU','FE'].includes(f))return`ナチュラルはラフ・大きめシルエットが得意ですが、顔タイプは女性らしい雰囲気。大きめシルエットを選びながら、${pd.base}を活かして女性らしさをプラスするとバランスが取れます。`;
    return null;
  })();
  const blendMat=(()=>{
    const km=[...kd.mat];
    if(pd.vivid)km.push("発色のよいクリアな素材");
    if(pd.deep)km.push("深みのある重厚な素材");
    if(pd.p.includes('夏')||pd.p.includes('冬'))km.push("クールで上質な素材");
    return km;
  })();
  const blendSil=(()=>{
    if(k==='W'&&['CO','EL','SE'].includes(f))return[...kd.sil,"ウエストマークで大人っぽく"];
    if(k==='S'&&['CU','AK'].includes(f))return[...kd.sil.slice(0,2),"首元にポイントをつくる"];
    if(k==='N'&&['FE','CU'].includes(f))return[...kd.sil,"素材感で女性らしさをプラス"];
    return kd.sil;
  })();
  return{summary,conflict,silhouette:blendSil,material:blendMat,avoid:kd.avoid,
    colors:pd.colors,colorBase:pd.base,avoidColor:pd.avoid,
    necklines:kd.necklines,avoidNeck:kd.avoidNeck,faceNeck:fd.neck,
    makeup:fd.makeup,makeupColor:pd.makeup,
    metal:pd.metal,acc:fd.acc,
    pattern:kd.pattern,avoidPattern:kd.avoidPattern,pcPattern:pd.pattern,items:kd.items};
}

            <option value="Su_W" ${sel.p==='Su_W'?'selected':''}>夏 × セカンド冬</option>
          </optgroup>
          <optgroup label="─ イエベ秋（1st Autumn）">
            <option value="A_S" ${sel.p==='A_S'?'selected':''}>秋 × セカンド春</option>
            <option value="A_Su" ${sel.p==='A_Su'?'selected':''}>秋 × セカンド夏</option>
            <option value="A_W" ${sel.p==='A_W'?'selected':''}>秋 × セカンド冬</option>
          </optgroup>
          <optgroup label="─ ブルベ冬（1st Winter）">
            <option value="W_S" ${sel.p==='W_S'?'selected':''}>冬 × セカンド春</option>
            <option value="W_Su" ${sel.p==='W_Su'?'selected':''}>冬 × セカンド夏</option>
            <option value="W_A" ${sel.p==='W_A'?'selected':''}>冬 × セカンド秋</option>
          </optgroup>
        </select>
      </div>
    </div>
    <button class="run-btn" id="runbtn" ${allSet?'':'disabled'}>スタイリングレポートを生成する</button>
    ${showing?'<button class="reset-btn" id="resetbtn">レポートを閉じる</button>':''}
    <div id="report"></div>`;
  document.getElementById('sk').addEventListener('change',e=>{sel.k=e.target.value||null;renderSelector();});
  document.getElementById('sf').addEventListener('change',e=>{sel.f=e.target.value||null;renderSelector();});
  document.getElementById('sp').addEventListener('change',e=>{sel.p=e.target.value||null;renderSelector();});
  document.getElementById('runbtn').addEventListener('click',()=>{
    if(!sel.k||!sel.f||!sel.p)return;
    showing=true;renderSelector();renderReport();
  });
  if(showing){
    const rb=document.getElementById('resetbtn');
    if(rb)rb.addEventListener('click',()=>{showing=false;renderSelector();});
    if(sel.k&&sel.f&&sel.p)renderReport();
  }
}
