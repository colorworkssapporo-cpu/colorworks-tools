<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="メンズ診断">
<title>COLORWORKS メンズスタイル診断</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f3;--text:#1a1a1a;--text2:#666;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --rm:10px;--rl:14px;
  --brand:#1B2880;--brand2:#00A8C0;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a1a;--bg2:#252525;--text:#f0f0f0;--text2:#999;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22)}
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:var(--bg2);color:var(--text);-webkit-text-size-adjust:100%}
.app-shell{display:flex;flex-direction:column;height:100dvh;max-width:680px;margin:0 auto;background:var(--bg)}
.app-header{background:var(--brand);padding:12px 16px 10px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.app-header-title{font-size:13px;font-weight:500;color:white;letter-spacing:.08em}
.app-header-sub{font-size:10px;color:rgba(255,255,255,.65);letter-spacing:.06em}
.app-header-badge{font-size:10px;padding:3px 10px;border:1px solid rgba(255,255,255,.4);border-radius:20px;color:rgba(255,255,255,.85)}
.tab-bar{display:flex;background:var(--bg);border-bottom:.5px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:80px;padding:10px 4px 8px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text2);transition:color .15s;position:relative}
.tab-btn .tab-icon{font-size:17px;line-height:1}
.tab-btn .tab-label{font-size:9.5px;letter-spacing:.03em;white-space:nowrap;color:inherit}
.tab-btn.active{color:var(--brand)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:2px;background:var(--brand);border-radius:1px}
.content-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.5rem 1rem 2rem}
.panel{display:none}.panel.active{display:block}

/* Shared tool styles */
.hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:1.25rem;border-bottom:.5px solid var(--border);margin-bottom:1.75rem}
.htitle{font-size:12px;font-weight:500;letter-spacing:.12em;color:var(--text2)}
.hbadge{font-size:11px;padding:3px 10px;border:.5px solid var(--border);border-radius:20px;color:var(--text2)}
.srow{display:flex;justify-content:space-between;margin-bottom:7px}
.slabel{font-size:12px;color:var(--text2)}
.pbar{width:100%;height:2px;background:var(--border);border-radius:2px;margin-bottom:1.5rem}
.pfill{height:2px;background:var(--text);border-radius:2px;transition:width .4s ease}
.ctag{display:inline-block;font-size:11px;letter-spacing:.07em;color:var(--text2);border:.5px solid var(--border);border-radius:3px;padding:2px 8px;margin-bottom:10px}
.qtext{font-size:15px;font-weight:500;color:var(--text);margin-bottom:5px;line-height:1.6}
.qsub{font-size:12px;color:var(--text2);margin-bottom:1.25rem;line-height:1.6}
.opt{display:grid;grid-template-columns:auto 1fr;align-items:start;gap:10px;width:100%;padding:11px 14px;margin-bottom:7px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rm);cursor:pointer;text-align:left;transition:all .15s}
.opt:hover{background:var(--bg);border-color:var(--border2)}
.opt.sel{background:var(--bg);border-color:var(--text)}
.odot{width:16px;height:16px;min-width:16px;border-radius:50%;border:1.5px solid var(--border2);margin-top:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt.sel .odot{border-color:var(--text);background:var(--text)}
.oi{width:6px;height:6px;border-radius:50%;background:var(--bg);display:none}
.opt.sel .oi{display:block}
.olabel{font-size:13px;font-weight:500;color:var(--text);line-height:1.5}
.odesc{font-size:12px;color:var(--text2);margin-top:2px}
.navrow{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem}
.btnp{padding:10px 26px;background:var(--text);color:var(--bg);border:none;border-radius:var(--rm);font-size:13px;cursor:pointer;letter-spacing:.04em}
.btnp:disabled{opacity:.25;cursor:not-allowed}
.btng{padding:10px 18px;background:transparent;border:.5px solid var(--border);border-radius:var(--rm);font-size:13px;color:var(--text2);cursor:pointer}
.sec{font-size:11px;letter-spacing:.1em;color:var(--text2);margin:1.5rem 0 10px;padding-bottom:6px;border-bottom:.5px solid var(--border)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.5rem}
.tag{font-size:12px;padding:4px 12px;border:.5px solid var(--border);border-radius:20px;color:var(--text2)}
.tag.avoid{text-decoration:line-through;opacity:.5;background:var(--bg2)}
.cards2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.5rem}
.card{background:var(--bg2);border-radius:var(--rm);padding:11px 13px}
.card-k{font-size:11px;color:var(--text2);margin-bottom:4px;letter-spacing:.05em}
.card-v{font-size:12px;color:var(--text);line-height:1.6}
.divider{height:.5px;background:var(--border);margin:1.5rem 0}
.color-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:.5rem}
.cswatch{display:flex;align-items:center;gap:6px;padding:4px 11px 4px 5px;border:.5px solid var(--border);border-radius:20px}
.cdot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.cname{font-size:11px;color:var(--text2)}
.mup-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.5rem}
.mup-item{background:var(--bg2);border-radius:var(--rm);padding:10px 12px}
.mup-k{font-size:11px;color:var(--text2);margin-bottom:3px;letter-spacing:.05em}
.mup-v{font-size:12px;color:var(--text);line-height:1.55}
.score-row{margin-bottom:10px}
.score-top{display:flex;justify-content:space-between;margin-bottom:4px}
.score-lbl{font-size:12px;color:var(--text)}
.score-num{font-size:12px;color:var(--text2)}
.score-bg{height:5px;background:var(--border);border-radius:3px}
.score-fill{height:5px;border-radius:3px;transition:width .7s ease}
.hlbox{border:.5px solid var(--border);border-radius:var(--rm);padding:14px 16px;margin-top:.5rem}
.hl-label{font-size:11px;color:var(--text2);letter-spacing:.07em;margin-bottom:6px}
.hl-text{font-size:13px;color:var(--text);line-height:1.75}
.cfbox{background:var(--bg2);border-radius:var(--rm);padding:12px 14px;margin:.5rem 0}
.cf-label{font-size:11px;color:var(--text2);margin-bottom:5px}
.cf-text{font-size:12px;color:var(--text2);line-height:1.7}
.restart{width:100%;padding:10px;background:transparent;border:.5px solid var(--border);border-radius:var(--rm);font-size:13px;color:var(--text2);cursor:pointer;margin-top:1rem}
.r-accent{height:3px;border-radius:1px;width:48px;margin-bottom:1.25rem}
.r-label{font-size:11px;letter-spacing:.15em;color:var(--text2);margin-bottom:8px}
.r-name{font-size:26px;font-weight:500;color:var(--text);letter-spacing:.04em;margin-bottom:4px}
.r-eng{font-size:12px;color:var(--text2);letter-spacing:.12em;margin-bottom:1rem}
.r-desc{font-size:13px;color:var(--text2);line-height:1.85;margin-bottom:1.5rem}
.badges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.cbadge{font-size:11px;padding:3px 12px;border-radius:20px;font-weight:500}
</style>
</head>
<body>
<div class="app-shell">
  <div class="app-header">
    <div>
      <div class="app-header-title">COLORWORKS メンズ診断</div>
      <div class="app-header-sub">sapporo</div>
    </div>
    <div class="app-header-badge">Men's</div>
  </div>
  <div class="tab-bar" role="tablist">
    <button class="tab-btn active" data-tab="kokkaku" onclick="switchTab('kokkaku')" role="tab">
      <span class="tab-icon">📐</span><span class="tab-label">骨格診断</span>
    </button>
    <button class="tab-btn" data-tab="kao" onclick="switchTab('kao')" role="tab">
      <span class="tab-icon">👤</span><span class="tab-label">顔タイプ</span>
    </button>
    <button class="tab-btn" data-tab="pc" onclick="switchTab('pc')" role="tab">
      <span class="tab-icon">🎨</span><span class="tab-label">カラー診断</span>
    </button>
    <button class="tab-btn" data-tab="axis" onclick="switchTab('axis')" role="tab">
      <span class="tab-icon">✨</span><span class="tab-label">3軸アドバイス</span>
    </button>
  </div>
  <div class="content-area">

    <!-- ═══════════════════════════════════════════════ -->
    <!-- PANEL 1: 骨格診断（男性版） -->
    <!-- ═══════════════════════════════════════════════ -->
    <div id="panel_kokkaku" class="panel active">
      <div class="hdr">
        <span class="htitle">骨格診断（メンズ）</span>
        <span class="hbadge">Professional</span>
      </div>
      <div id="main_kokkaku"></div>
    </div>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- PANEL 2: 顔タイプ診断（男性版） -->
    <!-- ═══════════════════════════════════════════════ -->
    <div id="panel_kao" class="panel">
      <div class="hdr">
        <span class="htitle">顔タイプ診断（メンズ）</span>
        <span class="hbadge">8 Types</span>
      </div>
      <div id="main_kao"></div>
    </div>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- PANEL 3: パーソナルカラー診断（男女共通） -->
    <!-- ═══════════════════════════════════════════════ -->
    <div id="panel_pc" class="panel">
      <div class="hdr">
        <span class="htitle">パーソナルカラー診断</span>
        <span class="hbadge">1st + 2nd · 12タイプ</span>
      </div>
      <div id="main_pc"></div>
    </div>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- PANEL 4: 3軸アドバイザー（男性版） -->
    <!-- ═══════════════════════════════════════════════ -->
    <div id="panel_axis" class="panel">
      <div class="hdr">
        <span class="htitle">3軸スタイリングアドバイザー</span>
        <span class="hbadge">メンズ · 12シーズン</span>
      </div>
      <div id="main_axis"></div>
    </div>

  </div>
</div>

<script>
// ── Tab Switching ─────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.panel').forEach(p=>{p.style.display='none';p.classList.remove('active')});
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const panel=document.getElementById('panel_'+tab);
  if(panel){panel.style.display='block';panel.classList.add('active')}
  const btn=document.querySelector('[data-tab="'+tab+'"]');
  if(btn)btn.classList.add('active');
  document.querySelector('.content-area').scrollTop=0;
}
document.getElementById('panel_kokkaku').style.display='block';

// ═══════════════════════════════════════════════════════════════
// 1. 骨格診断（男性版）
// ═══════════════════════════════════════════════════════════════
(function(){
const Qs=[
  {cat:"首・肩",q:"首の太さ・長さはどちらに近いですか？",sub:"正面・横から確認してください。",opts:[
    {l:"短め・太め・筋肉質",d:"首が短く太く、がっしりした印象",t:"S"},
    {l:"長め・細め・なで肩気味",d:"首が長く細く、肩が下がり気味",t:"W"},
    {l:"長め・骨張っている",d:"首筋が見え、骨感がある",t:"N"}]},
  {cat:"首・肩",q:"肩の形・幅はどちらに近いですか？",sub:"肩の張り出し・厚みを確認してください。",opts:[
    {l:"丸みがある・厚い・いかり肩",d:"肩が丸く厚みがあり張り出している",t:"S"},
    {l:"なで肩・薄い",d:"肩が下がり気味で薄い印象",t:"W"},
    {l:"骨張った肩・フレームが大きい",d:"肩幅はあるが薄く骨格が目立つ",t:"N"}]},
  {cat:"胸・体幹",q:"胸板・体幹の質感はどちらに近いですか？",sub:"上半身の厚みと質感を確認してください。",opts:[
    {l:"厚みがある・筋肉質・ハリがある",d:"上半身が立体的でメリハリがある",t:"S"},
    {l:"薄め・やわらかい",d:"全体的に薄く平らな印象",t:"W"},
    {l:"骨格が目立つ・肋骨が見える",d:"骨格やフレームが前面に出る",t:"N"}]},
  {cat:"ウエスト",q:"ウエストのラインはどちらに近いですか？",sub:"体の横から確認してください。",opts:[
    {l:"くびれがある・高め",d:"ウエストが比較的高くしまっている",t:"S"},
    {l:"低め・腰回りがやわらかい",d:"くびれが低く丸みがある",t:"W"},
    {l:"ほぼ直線的",d:"くびれが少なくボックス型",t:"N"}]},
  {cat:"下半身",q:"腰・ヒップの形はどちらに近いですか？",sub:"横から確認してください。",opts:[
    {l:"高め・コンパクト",d:"ヒップの位置が高くコンパクト",t:"S"},
    {l:"低め・丸みがある",d:"ヒップが低く丸みがある",t:"W"},
    {l:"横に広い・骨盤が大きい",d:"骨盤が張り出しフレーム感がある",t:"N"}]},
  {cat:"下半身",q:"脚の形はどちらに近いですか？",sub:"太もも〜ふくらはぎの形を確認してください。",opts:[
    {l:"太もも前面が張っている・筋肉質",d:"前張りで筋肉質",t:"S"},
    {l:"細め・全体的にすっきり",d:"細くスリムな脚",t:"W"},
    {l:"膝下が長い・骨感がある",d:"スネが目立ち直線的な脚",t:"N"}]},
  {cat:"手・腕",q:"手の質感・形はどちらに近いですか？",sub:"手の甲・指の形を確認してください。",opts:[
    {l:"厚みがある・ハリがある",d:"弾力があり肉感のある手",t:"S"},
    {l:"薄い・やわらかい",d:"薄くやわらかい手",t:"W"},
    {l:"骨張っている・指が長い",d:"関節が目立ち細長い",t:"N"}]},
  {cat:"全体",q:"全体的な体のシルエットはどちらに近いですか？",sub:"",opts:[
    {l:"逆三角形・上半身が目立つ",d:"肩幅広く下に向かって細くなる",t:"S"},
    {l:"全体的に細め・均一",d:"上下バランスよく細い",t:"W"},
    {l:"長方形・フレーム感がある",d:"上下同じ幅でがっしりした骨格",t:"N"}]},
  {cat:"全体",q:"体の重心はどちらに近いですか？",sub:"ボリュームの位置を確認してください。",opts:[
    {l:"上半身にボリューム",d:"胸板・肩に存在感がある",t:"S"},
    {l:"下半身にボリューム",d:"腰回り・太ももが目立つ",t:"W"},
    {l:"全体的にフレーム感",d:"骨格が大きく上下均等",t:"N"}]},
  {cat:"全体",q:"着こなしで感じることはどちらに近いですか？",sub:"",opts:[
    {l:"シンプルな服が一番似合う・着太りしやすい",d:"余計なデザインが邪魔になりやすい",t:"S"},
    {l:"大きい服が似合わない・小さく見える",d:"オーバーサイズが重く見える",t:"W"},
    {l:"何でもそれなりに着こなせる",d:"着こなしの幅が広い",t:"N"}]},
];

const R={
  S:{name:"ストレートタイプ",eng:"Straight",col:"#1B4B8A",scol:"#a0b8d8",
    desc:"上半身に厚みとハリがあり、全体的にメリハリのある体型です。シンプルで上質な素材がもっともよく映えます。きちんと感のあるシャープなスタイリングが得意です。",
    sil:["Iライン","テーパードシルエット","タイト〜レギュラーフィット"],
    mat:["ウール","コットン（ハリあり）","シルク","カシミア"],
    items:["テーラードジャケット","スラックス","シンプルシャツ","タートルネック","トレンチコート"],
    avoid:["だぼっとしたシルエット","ゆるすぎるシルエット","小さいドット柄・細かい総柄"],
    collar:["Vネック（浅め）","レギュラーカラー","ワイドカラー","テーラードカラー","シャツ第2ボタン開け"],
    avoidCollar:["詰まったクルーネック","ぴったりハイネック","ボートネック"],
    pattern:["縦ストライプ（太め）","大柄チェック","コントラスト強め","シンプルロゴ"],
    avoidPattern:["小さいドット","細かい総柄","コントラストの弱い柄"],
    key:"シンプル・上質・テーラード"},
  W:{name:"ウェーブタイプ",eng:"Wave",col:"#2A7A5A",scol:"#90c8a8",
    desc:"全体的に細くやわらかい体型で、上半身にボリュームを持たせることでバランスが整います。柔らかい素材やレイヤードスタイルが似合います。",
    sil:["ショート丈トップス","Vライン","レイヤード"],
    mat:["やわらかいニット","シャツ（薄手）","リネン","ジャージー素材"],
    items:["Vネックニット","ショート丈ジャケット","スキニーパンツ","チェスターコート（短め）"],
    avoid:["オーバーサイズトップス","ダボッとしたシルエット","大きく開いたネックライン"],
    collar:["クルーネック（フィット）","Vネック（浅め）","スタンドカラー","スキッパーカラー","モックネック"],
    avoidCollar:["大きく開いたVネック","オープンカラー（大きめ）","ダボッとしたタートル"],
    pattern:["細かいチェック","細いストライプ","小さいドット","ペイズリー"],
    avoidPattern:["大柄","コントラストが強すぎる柄","太いボーダー"],
    key:"フィット・ソフト・レイヤード"},
  N:{name:"ナチュラルタイプ",eng:"Natural",col:"#5A4A2A",scol:"#b8a880",
    desc:"骨格がしっかりしていてフレーム感と直線的なラインが特徴です。素材感と抜け感を活かしたラフなスタイリングが得意。こなれ感が自然と出るタイプです。",
    sil:["オーバーサイズ","ゆったりIライン","ロングライン","ワイドシルエット"],
    mat:["リネン","デニム","レザー","ざっくりニット","コーデュロイ"],
    items:["ワイドパンツ","オーバーサイズシャツ","ロングコート","セットアップ（ゆったり）","ジョガーパンツ"],
    avoid:["タイトすぎるもの","深いVネック（鎖骨強調）","ピタッとしたシルエット"],
    collar:["ボートネック","タートルネック（ゆったり）","オフタートル","開襟シャツ（バンドカラー）","クルーネック（ゆったり）"],
    avoidCollar:["深いVネック（鎖骨・肩幅が目立つ）","ぴったりタートル","スリムフィットクルーネック"],
    pattern:["大柄チェック","民族柄","ボタニカル（大きめ）","迷彩","太いストライプ"],
    avoidPattern:["小花柄","細かい総柄","コントラストの弱い柄"],
    key:"ラフ・素材感・こなれ"},
};

let cur=0,ans=[],scores={S:0,W:0,N:0};
const N_Q=Qs.length;

function render(){document.getElementById('main_kokkaku').innerHTML='';cur<N_Q?renderQ():renderResult();}

function renderQ(){
  const q=Qs[cur],sel=ans[cur];
  const pct=Math.round(cur/N_Q*100);
  const el=document.createElement('div');
  el.innerHTML=`
    <div class="srow"><span class="slabel">${cur+1} / ${N_Q}</span><span class="slabel">${q.cat}</span></div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    <div class="ctag">${q.cat}</div>
    <div class="qtext">${q.q}</div>
    ${q.sub?`<div class="qsub">${q.sub}</div>`:''}
    ${q.opts.map((o,i)=>`
      <div class="opt${sel===i?' sel':''}" data-i="${i}">
        <div class="odot"><div class="oi"></div></div>
        <div><div class="olabel">${o.l}</div><div class="odesc">${o.d}</div></div>
      </div>`).join('')}
    <div class="navrow">
      <button class="btng" id="bk_k" ${cur===0?'style="visibility:hidden"':''}>← 戻る</button>
      <button class="btnp" id="nx_k" ${sel===undefined?'disabled':''}>
        ${cur===N_Q-1?'診断する →':'次へ →'}

function getType(a,c){
  // a軸: 大人顔=正 / 子供顔=負  (7問×最大3点 = ±21)
  // c軸: 曲線=正 / 直線=負      (8問×最大3点 = ±24)
  if(a>=4){
    // 大人顔
    if(c>=8)  return 'SFT'; // 大人×強い曲線 → ソフトマスキュリン
    if(c>=2)  return 'CLS'; // 大人×やや曲線 → クラシック
    if(c<=-6) return 'BOL'; // 大人×強い直線 → ボールド
    return 'SHA';            // 大人×ミックス  → シャープ
  } else if(a<=-4){
    // 子供顔
    if(c>=10) return 'ACT'; // 子供×強い曲線 → アクティブ
    if(c>=3)  return 'FRE'; // 子供×やや曲線 → フレッシュ
    if(c<=-4) return 'CLC'; // 子供×直線     → クールカジュアル
    return 'NAT';            // 子供×ミックス  → ナチュラル
  } else {
    // 中間（やや大人 or やや子供）
    if(a>=0){
      if(c>=6) return 'SFT';
      if(c>=1) return 'CLS';
      if(c<=-5) return 'BOL';
      return 'SHA';
    } else {
      if(c>=8) return 'ACT';
      if(c>=2) return 'FRE';
      if(c<=-3) return 'CLC';
      return 'NAT';
    }
  }
}

  ACT:{name:"アクティブ",col:"#d47f50",bcol:"#fdf0e8",collar:["クルーネック","スタンドカラー","オープンカラー"],acc:"カラフルスニーカー・キャップ",style:"カジュアル・スポーティ"},
  FRE:{name:"フレッシュ",col:"#5e9e90",bcol:"#edf6f4",collar:["クルーネック","Vネック","ボタンダウン"],acc:"シンプル時計・ホワイトスニーカー",style:"シンプル・ナチュラル"},
  CLC:{name:"クールカジュアル",col:"#5a7898",bcol:"#ecf0f5",collar:["バンドカラー","オープンカラー","クルーネック"],acc:"シンプルシルバー・バックパック",style:"ストリート・カジュアル"},
  SFT:{name:"ソフトマスキュリン",col:"#907898",bcol:"#f4eff4",collar:["レギュラーカラー","Vネック","タートルネック"],acc:"細めゴールドorシルバー・革靴",style:"きれいめカジュアル"},
  SHA:{name:"シャープ",col:"#607890",bcol:"#ecf1f6",collar:["ワイドカラー","タートルネック","ノーカラー"],acc:"シルバー時計・革靴",style:"クラシック・モード"},
  BOL:{name:"ボールド",col:"#506070",bcol:"#eaeff4",collar:["ハイネック","タートルネック","オープンカラー"],acc:"シルバー大ぶり・ブーツ",style:"モード・ストリート"},
  NAT:{name:"ナチュラル",col:"#4a7a55",bcol:"#edf5ef",collar:["開襟シャツ","バンドカラー","ボタンダウン"],acc:"レザーウォッチ・ワークブーツ",style:"アメカジ・ヴィンテージ"},
  CLS:{name:"クラシック",col:"#3a5a3a",bcol:"#edf5ed",collar:["ワイドスプレッド","レギュラーカラー","Vネック"],acc:"革靴・機械式時計",style:"クラシック・フォーマル"},
};

const PC={
  S_A:{name:"リッチスプリング",p:"イエベ春",s:"イエベ秋",col:"#b08030",bcol:"#fdf8ec",colors:[{n:"キャメル",c:"#c89860"},{n:"コーラル",c:"#e8907a"},{n:"テラコッタ",c:"#c07050"},{n:"ゴールド",c:"#e8c050"},{n:"アイボリー",c:"#f8f0e0"}],avoid:["くすみ","青み"],mat:"暖かみのある素材・自然な発色",metal:"ゴールド"},
  S_Su:{name:"ソフトスプリング",p:"イエベ春",s:"ブルベ夏",col:"#c09060",bcol:"#fdf8f0",colors:[{n:"ピーチ",c:"#f0b090"},{n:"アイボリー",c:"#f8f0e0"},{n:"ライトキャメル",c:"#d8b880"},{n:"ソフトコーラル",c:"#f0a090"},{n:"ミルキー",c:"#f5e8a0"}],avoid:["ダーク","ビビッド"],mat:"やわらかく明るい素材",metal:"ゴールド・ピンクゴールド"},
  S_W:{name:"クリアスプリング",p:"イエベ春",s:"ブルベ冬",col:"#c07838",bcol:"#fdf4ec",colors:[{n:"オレンジ",c:"#f08040"},{n:"イエロー",c:"#f8d820"},{n:"ホワイト",c:"#fff8f0"},{n:"グリーン",c:"#80c860"},{n:"コーラルレッド",c:"#e86040"}],avoid:["くすみ","アースカラー"],mat:"鮮やかでクリアな素材",metal:"ゴールド"},
  Su_S:{name:"ライトサマー",p:"ブルベ夏",s:"イエベ春",col:"#6080a0",bcol:"#edf1f8",colors:[{n:"ライトブルー",c:"#b0c8e8"},{n:"グレー",c:"#c0c0c8"},{n:"ラベンダー",c:"#d8c8f0"},{n:"オフホワイト",c:"#f5f0f0"},{n:"スモーキー",c:"#a8b8c8"}],avoid:["ビビッド","アースカラー"],mat:"明るくやわらかい素材",metal:"シルバー"},
  Su_A:{name:"ミュートサマー",p:"ブルベ夏",s:"イエベ秋",col:"#7888a0",bcol:"#edf1f5",colors:[{n:"スモーキーブルー",c:"#8090b0"},{n:"グレーブルー",c:"#9098a8"},{n:"ダスティグリーン",c:"#80a090"},{n:"グレー",c:"#a0a0a8"},{n:"くすみネイビー",c:"#607090"}],avoid:["ビビッド","黄み"],mat:"マットでやわらかい素材",metal:"シルバー・アンティーク"},
  Su_W:{name:"クリアサマー",p:"ブルベ夏",s:"ブルベ冬",col:"#5068a0",bcol:"#eceff8",colors:[{n:"ネイビー",c:"#304880"},{n:"グレー",c:"#a8a8b8"},{n:"ラベンダー",c:"#c0a8e0"},{n:"ホワイト",c:"#f8f8fc"},{n:"スモーキーブルー",c:"#8090b0"}],avoid:["アースカラー","黄み"],mat:"クリアで上質な素材",metal:"シルバー・プラチナ"},
  A_S:{name:"ライトオータム",p:"イエベ秋",s:"イエベ春",col:"#a08040",bcol:"#f8f4ec",colors:[{n:"ベージュ",c:"#d8b890"},{n:"キャメル",c:"#d0a870"},{n:"アイボリー",c:"#f5ead8"},{n:"テラコッタ",c:"#c89070"},{n:"モス",c:"#b8a870"}],avoid:["青み","ダーク"],mat:"ナチュラルで明るい素材",metal:"ゴールド"},
  A_Su:{name:"ソフトオータム",p:"イエベ秋",s:"ブルベ夏",col:"#808050",bcol:"#f5f0e8",colors:[{n:"オリーブ",c:"#808040"},{n:"テラコッタ",c:"#b87860"},{n:"ブラウン",c:"#a08060"},{n:"カーキ",c:"#909060"},{n:"モスグリーン",c:"#888850"}],avoid:["ビビッド","青み"],mat:"マットでナチュラルな素材",metal:"マットゴールド"},
  A_W:{name:"ディープオータム",p:"イエベ秋",s:"ブルベ冬",col:"#784830",bcol:"#f5eee8",colors:[{n:"バーガンディ",c:"#903040"},{n:"フォレスト",c:"#405030"},{n:"チョコレート",c:"#604030"},{n:"ダークカーキ",c:"#606030"},{n:"マホガニー",c:"#784030"}],avoid:["パステル","青み"],mat:"深みのある重厚な素材",metal:"アンティークゴールド"},
  W_S:{name:"クリアウィンター",p:"ブルベ冬",s:"イエベ春",col:"#4858a0",bcol:"#eceff8",colors:[{n:"ロイヤルブルー",c:"#4060c0"},{n:"ホワイト",c:"#f8f8f8"},{n:"レッド",c:"#e83040"},{n:"ネイビー",c:"#202860"},{n:"ビビッドグリーン",c:"#206040"}],avoid:["アースカラー","くすみ"],mat:"クリアでシャープな素材",metal:"シルバー・プラチナ"},
  W_Su:{name:"クールウィンター",p:"ブルベ冬",s:"ブルベ夏",col:"#384878",bcol:"#eceff8",colors:[{n:"ネイビー",c:"#2840a0"},{n:"チャコール",c:"#404850"},{n:"グレー",c:"#707880"},{n:"バーガンディ",c:"#800830"},{n:"ブラック",c:"#202028"}],avoid:["アースカラー","黄み"],mat:"クールでシャープな素材",metal:"シルバー・プラチナ"},
  W_A:{name:"ダークウィンター",p:"ブルベ冬",s:"イエベ秋",col:"#283850",bcol:"#eceef4",colors:[{n:"ディープネイビー",c:"#182040"},{n:"ダークワイン",c:"#601030"},{n:"チャコール",c:"#303838"},{n:"フォレスト",c:"#1a3020"},{n:"プラム",c:"#601848"}],avoid:["パステル","ライト"],mat:"深みのある重厚な素材",metal:"シルバー・ガンメタル"},
};

function synthesize(k,f,p){
  const kd=KK[k],fd=KA[f],pd=PC[p];
  const summary=(()=>{
    if(k==='S'&&['SHA','CLS','SFT'].includes(f))return`${pd.name}の色味を活かした、洗練されたシャープなスタイル。${pd.mat}とシンプルなラインで3軸の良さが際立ちます。`;
    if(k==='S'&&['ACT','FRE'].includes(f))return`${pd.name}のカラーで彩りながら、ストレートの直線ラインを意識したクリーンなスタイル。トップスにポイントを、全体はすっきりまとめて。`;
    if(k==='W'&&['SFT','SHA','CLS'].includes(f))return`${pd.name}のカラーを活かした、フィット感と上品さが際立つきれいめスタイル。ショート丈アイテムで顔周りにボリュームを持たせて。`;
    if(k==='W'&&['BOL','CLC'].includes(f))return`${pd.name}の色でクールさを保ちながら、ウェーブのフィット感を活かすスタイル。コンパクトなアイテム選びでスタイリッシュに。`;
    if(k==='N'&&['BOL','CLC','NAT'].includes(f))return`${pd.name}のカラーで素材感・フレーム感を活かした、こなれたラフスタイル。${pd.mat}でナチュラルの魅力が引き立ちます。`;
    if(k==='N'&&['SHA','CLS','SFT'].includes(f))return`${pd.name}の上品なカラーに、ナチュラルの素材感・ボリューム感を掛け合わせた「こなれエレガント」スタイル。大きめシルエットの中に品を忍ばせて。`;
    return`${pd.name}の色味を活かしながら、${kd.name}の骨格ラインと${fd.name}の顔印象を融合させたあなただけのスタイル。`;
  })();
  const conflict=(()=>{
    if(k==='S'&&['ACT','BOL'].includes(f))return`骨格ストレートはシンプル・ハリ素材が得意ですが、顔タイプは個性的なデザインが映えます。インナーやアクセで個性を出しつつ、アウターはシンプルにまとめるとバランス◎`;
    if(k==='W'&&['BOL','CLC'].includes(f))return`ウェーブはフィット感・コンパクトが得意ですが、顔タイプはクールでラフな雰囲気。コンパクトなシルエットをベースに、色・素材でクール感を表現するとGOOD。`;
    if(k==='N'&&['SFT','CLS'].includes(f))return`ナチュラルはラフ・大きめが得意ですが、顔タイプはきれいめな雰囲気。大きめシルエットを選びながら、${pd.name}の上品なカラーで品を出すとバランスが取れます。`;
    return null;
  })();
  return{summary,conflict,silhouette:kd.sil,material:kd.mat,avoid:kd.avoid,
    colors:pd.colors,colorBase:pd.mat,avoidColor:pd.avoid,
    necklines:kd.necklines,avoidNeck:kd.avoidNeck,faceNeck:fd.collar,
    style:fd.style,acc:fd.acc,metal:pd.metal,
    pattern:kd.pattern,avoidPattern:kd.avoidPattern,items:kd.items};
}

let sel={k:null,f:null,p:null},showing=false;

function renderSelector(){
  const allSet=sel.k&&sel.f&&sel.p;
  document.getElementById('main_axis').innerHTML=`
    <div style="font-size:13px;color:var(--text2);margin-bottom:1.25rem;line-height:1.7">
      3つの診断結果を選択すると、あなただけのスタイリングレポートが生成されます。
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.5rem">
      ${[
        {id:'sk',label:'AXIS 01 骨格タイプ',opts:[['','選択'],['S','ストレート'],['W','ウェーブ'],['N','ナチュラル']]},
        {id:'sf',label:'AXIS 02 顔タイプ',opts:[['','選択'],['ACT','アクティブ'],['FRE','フレッシュ'],['CLC','クールカジュアル'],['SFT','ソフトマスキュリン'],['SHA','シャープ'],['BOL','ボールド'],['NAT','ナチュラル'],['CLS','クラシック']]},
        {id:'sp',label:'AXIS 03 カラー',opts:[['','選択'],['S_A','春×秋'],['S_Su','春×夏'],['S_W','春×冬'],['Su_S','夏×春'],['Su_A','夏×秋'],['Su_W','夏×冬'],['A_S','秋×春'],['A_Su','秋×夏'],['A_W','秋×冬'],['W_S','冬×春'],['W_Su','冬×夏'],['W_A','冬×秋']]},
      ].map(({id,label,opts})=>`
        <div style="border:.5px solid var(--border);border-radius:14px;padding:12px 10px">
          <div style="font-size:10px;letter-spacing:.1em;color:var(--text2);margin-bottom:4px">${label.split(' ')[0]}</div>
          <div style="font-size:11px;font-weight:500;color:var(--text);margin-bottom:8px">${label.split(' ').slice(1).join(' ')}</div>
          <select id="${id}" style="width:100%;padding:7px 8px;background:var(--bg2);border:.5px solid var(--border);border-radius:10px;font-size:11px;color:var(--text);-webkit-appearance:none">
            ${opts.map(([v,l])=>`<option value="${v}"${(id==='sk'?sel.k:id==='sf'?sel.f:sel.p)===v?' selected':''}>${l}</option>`).join('')}
          </select>
        </div>`).join('')}
    </div>
    <button style="width:100%;padding:11px;background:var(--text);color:var(--bg);border:none;border-radius:10px;font-size:13px;cursor:pointer;letter-spacing:.06em;margin-bottom:1.5rem;opacity:${allSet?1:.25}" id="runbtn" ${allSet?'':'disabled'}>
      スタイリングレポートを生成する
    </button>
    ${showing?'<button style="width:100%;padding:10px;background:transparent;border:.5px solid var(--border);border-radius:10px;font-size:13px;color:var(--text2);cursor:pointer" id="resetbtn">レポートを閉じる</button>':''}
    <div id="report_axis"></div>`;

  document.getElementById('sk').addEventListener('change',e=>{sel.k=e.target.value||null;renderSelector();});
  document.getElementById('sf').addEventListener('change',e=>{sel.f=e.target.value||null;renderSelector();});
  document.getElementById('sp').addEventListener('change',e=>{sel.p=e.target.value||null;renderSelector();});
  document.getElementById('runbtn').addEventListener('click',()=>{
    if(!sel.k||!sel.f||!sel.p)return;
    showing=true;renderSelector();renderReport();
  });
  if(showing){
    const rb=document.getElementById('resetbtn');
    if(rb)rb.addEventListener('click',()=>{showing=false;renderSelector();});
    if(sel.k&&sel.f&&sel.p)renderReport();
  }
}

function renderReport(){
  const d=synthesize(sel.k,sel.f,sel.p);
  const kd=KK[sel.k],fd=KA[sel.f],pd=PC[sel.p];
  document.getElementById('report_axis').innerHTML=`
    <div class="divider"></div>
    <div style="margin-bottom:1.5rem">
      <div class="badges">
        <span class="cbadge" style="background:${kd.bcol};color:${kd.col}">${kd.name}</span>
        <span class="cbadge" style="background:${fd.bcol};color:${fd.col}">${fd.name}</span>
        <span class="cbadge" style="background:${pd.bcol};color:${pd.col}">${pd.p}×${pd.s.replace('イエベ','').replace('ブルベ','')}</span>
        <span class="cbadge" style="background:${pd.bcol};color:${pd.col};font-weight:500">${pd.name}</span>
      </div>
      <div style="font-size:19px;font-weight:500;color:var(--text);margin-bottom:8px">あなたのスタイルプロフィール</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.85">${d.summary}</div>
    </div>
    ${d.conflict?`<div class="cfbox"><div class="cf-label">3軸のバランスについて</div><div class="cf-text">${d.conflict}</div></div>`:''}
    <div class="sec">シルエット・ライン</div>
    <div class="tags">${d.silhouette.map(s=>`<span class="tag">${s}</span>`).join('')}</div>
    <div class="sec">素材・テクスチャー</div>
    <div class="tags">${d.material.map(m=>`<span class="tag">${m}</span>`).join('')}</div>
    <div class="sec">避けたいアイテム</div>
    <div class="tags">${d.avoid.map(a=>`<span class="tag avoid">${a}</span>`).join('')}</div>
    <div class="divider"></div>
    <div class="sec">似合うカラーパレット</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px">${d.colorBase}</div>
    <div class="color-row">${d.colors.map(c=>`<div class="cswatch"><div class="cdot" style="background:${c.c}"></div><span class="cname">${c.n}</span></div>`).join('')}</div>
    <div style="margin-top:8px"><div class="tags">${d.avoidColor.map(a=>`<span class="tag avoid">${a}</span>`).join('')}</div></div>
    <div class="divider"></div>
    <div class="sec">似合う衿形（骨格から）</div>
    <div class="tags">${d.necklines.map(n=>`<span class="tag">${n}</span>`).join('')}</div>
    <div class="sec">似合う衿形（顔タイプから）</div>
    <div class="tags">${d.faceNeck.map(n=>`<span class="tag">${n}</span>`).join('')}</div>
    <div class="sec">避けたい衿形</div>
    <div class="tags">${d.avoidNeck.map(n=>`<span class="tag avoid">${n}</span>`).join('')}</div>
    <div class="sec">おすすめアイテム</div>
    <div class="tags">${d.items.map(i=>`<span class="tag">${i}</span>`).join('')}</div>
    <div class="divider"></div>
    <div class="sec">似合う柄（骨格から）</div>
    <div class="tags">${d.pattern.map(v=>`<span class="tag">${v}</span>`).join('')}</div>
    <div class="sec">避けたい柄</div>
    <div class="tags">${d.avoidPattern.map(v=>`<span class="tag avoid">${v}</span>`).join('')}</div>
    <div class="cards2">
      <div class="card"><div class="card-k">似合う金属</div><div class="card-v">${d.metal}</div></div>
      <div class="card"><div class="card-k">アクセサリー</div><div class="card-v">${d.acc}</div></div>
    </div>
    <div class="hlbox">
      <div class="hl-label">スタイリストメモ</div>
      <div class="hl-text">${d.summary}</div>
    </div>`;
}

renderSelector();
})();
</script>
</body>
</html>
